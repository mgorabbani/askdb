services:
  askdb:
    build: .
    image: askdb:local
    container_name: askdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"   # API + UI + MCP (single port)
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/askdb.db
      SERVE_UI: "1"
    volumes:
      - askdb-data:/app/data
      # Required: askdb spawns sandbox MongoDB containers via dockerode.
      - /var/run/docker.sock:/var/run/docker.sock
    # Required on Linux so the askdb container can reach sibling sandbox
    # containers via host.docker.internal (auto on Docker Desktop, manual on Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  askdb-data:
