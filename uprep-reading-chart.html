<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U Prep - Article Reading Heatmap</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    padding: 32px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #8b949e;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .chart-container {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .chart-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 16px 24px;
    flex: 1;
    min-width: 160px;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #58a6ff;
  }
  .stat-label {
    font-size: 12px;
    color: #8b949e;
    margin-top: 4px;
  }
  .stat-card.warn .stat-value { color: #f0883e; }
  .stat-card.danger .stat-value { color: #f85149; }
  .stat-card.success .stat-value { color: #3fb950; }
</style>
</head>
<body>

<h1>U Prep — Student Article Reading</h1>
<p class="subtitle">Weekly breakdown of article reads per student (all time)</p>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-value">1,753</div>
    <div class="stat-label">Total Reads</div>
  </div>
  <div class="stat-card success">
    <div class="stat-value">62</div>
    <div class="stat-label">Students With Reads</div>
  </div>
  <div class="stat-card danger">
    <div class="stat-value">~28</div>
    <div class="stat-label">Students With 0 Reads</div>
  </div>
  <div class="stat-card warn">
    <div class="stat-value">4</div>
    <div class="stat-label">Active in Latest Week</div>
  </div>
</div>

<div class="chart-container">
  <div class="chart-title">Reading Heatmap — Top 20 Students</div>
  <div id="heatmap"></div>
</div>

<div class="chart-container">
  <div class="chart-title">Total Reads Per Week (All Students)</div>
  <div id="weekly-bar"></div>
</div>

    toolbar: { show: false },

  dataLabels: {

    style: { fontSize: '11px', colors: ['#e1e4e8'] },
    formatter: (val) => val === 0 ? '' : val
  },
  colors: ['#3fb950'],
  plotOptions: {
    heatmap: {
      radius: 4,
      enableShades: true,
      shadeIntensity: 0.8,
      colorScale: {
        ranges: [
          { from: 0, to: 0, color: '#1c2128', name: 'No reads' },
          { from: 1, to: 5, color: '#0e4429', name: '1-5' },
          { from: 6, to: 15, color: '#006d32', name: '6-15' },
          { from: 16, to: 30, color: '#26a641', name: '16-30' },
          { from: 31, to: 70, color: '#3fb950', name: '31+' },
        ]
      }
    }
  },
  xaxis: {
    labels: { style: { colors: '#8b949e', fontSize: '12px' } }
  },
  yaxis: {
    labels: { style: { colors: '#8b949e', fontSize: '11px' } }
  },
  grid: { show: false },
  stroke: { width: 2, colors: ['#0f1117'] },
  tooltip: {
    theme: 'dark',
    y: { formatter: (val) => val + ' reads' }
  },
  legend: { show: false },
  theme: { mode: 'dark' }

  ...heatmapOptions,
  series: heatmapSeries
}).render();

</html>
